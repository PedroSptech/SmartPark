<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark | Login</title>
    <link rel="stylesheet" href="styles/stylelogin.css">
</head>

<body class="login-body">

    <div class="login-container">
        <a href="index.html" class="back-home">
            ← Voltar para Home
        </a>
        <!-- LOGO -->
        <div class="login-header">
            <a href="index.html" class="logo-link">
                <div class="logo-circle">P</div>
            </a>

            <h2>SmartPark</h2>
            <p>INTERFACE DE GERENCIAMENTO</p>
        </div>

        <!-- CARD -->
        <div class="login-card">

            <h1>Bem-vindo(a) de volta!</h1>
            <p class="login-sub">
                Por favor, insira seus dados para acessar a central.
            </p>

            <!-- EMAIL -->
            <label>Email</label>
            <div class="input-group">
                <input type="email" placeholder="name@company.com">
            </div>

            <!-- SENHA -->
            <div class="label-row">
                <label>Senha</label>
                <a href="#">Esqueceu sua senha?</a>
            </div>

            <div class="input-group">
                <input type="password" placeholder="••••••••">
            </div>

            <!-- CHECK -->
            <div class="remember">
                <input type="checkbox" id="remember">
                <label for="remember">Lembrar deste dispositivo</label>
            </div>

            <!-- BUTTON -->
            <button class="login-btn">
                Entrar no Painel →
            </button>

            <!-- DIVISOR -->
            <p class="divider">Ou continue com</p>

            <div class="alt-login">
                <button>SSO</button>
                <button>Key</button>
            </div>

            <!-- FOOT -->
            <p class="signup">
                Não tem uma conta? <a href="#">Peça um acesso</a>
            </p>

        </div>

        <div class="login-footer">
            <a href="#">Política de Privacidade</a>
            <a href="#">Termos de Serviço</a>
        </div>

    </div>

</body>

</html>
