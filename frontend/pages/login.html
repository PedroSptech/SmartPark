<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>SmartPark</title>
		<link rel="stylesheet" href="../css/login_reg.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
			rel="stylesheet"
		/>
	</head>

	<body>
		<div class="page">
			<div class="image-box image-box-login">
				<img class="image" src="../images/logo-image.svg" />
			</div>

			<div class="structure">
				<div class="home home-login">
					<a href="../index.html" class="btn-home btn">HOME</a>
				</div>

				<div class="form">
					<p class="title">LOGIN</p>
					<div class="card_erro" id="cardErro">
						<span id="error_message"></span>
					</div>
					<label class="input-text" for="ipt_email"> Email </label>
					<input type="text" class="input" id="ipt_email" />
					<br />
					<label class="input-text" for="ipt_passw"> Senha </label>
					<input type="password" class="input" id="ipt_passw" />
					<button class="btn btn-login" onclick="loginUser()">Entrar</button>
					<br />
					<p class="input-text">
						Não tem conta? <a href="./register.html">Inscreva-se</a>
					</p>
				</div>
			</div>
		</div>
	</body>
	<script src="../scripts/main.js"></script>
</html>
