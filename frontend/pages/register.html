<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPark</title>
  <link rel="stylesheet" href="../css/login_reg.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
</head>
<body>
  <div class="page">
			<div class="structure">
				<div class="home home-registro">
  				<a href="../index.html" class="btn-home btn">HOME</a>
				</div>

				<div class="form">
					<p class="title">CADASTRO</p>
          <label class="input-text" for="ipt_nomel">
            Nome
          </label>
          <input type="text" class="input" id="ipt_nome">	
          <br>

					<label class="input-text" for="ipt_email">
						Email
					</label>
					<input type="text" class="input" id="ipt_email">	
					<br>

					<label class="input-text" for="ipt_passw">
						Senha
					</label>
					<input type="password" class="input" id="ipt_passw">
          <br>

          <label class="input-text" for="ipt_passw">
						Confirmar senha
					</label>
					<input type="password" class="input" id="ipt_confirm_passw">

					<button class="btn btn-cadastro" onclick="registerUser()">Cadastrar</button>
					<br>
					<p class="input-text">Já tem uma conta? <a href="./login.html">Entre!</a></p>
				</div>
			</div>

      <div class="image-box image-box-cadastro">
				<img class="image" src="../images/logo-image.svg">
			</div>
		</div>  
</body>
<script src="../scripts/main.js"></script>
</html>
